<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>World Demo</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }

    .grid {
      display: grid;
      gap: 2px;
      background: #333;
    }

    .cell {
      width: 40px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      background: #7ec850; /* grassland */
    }
  </style>
</head>
<body>

<div id="app"></div>

<script type="module">
  class Cell {
    constructor({ x, y, terrain = 'grassland' }) {
      this.x = x
      this.y = y
      this.terrain = terrain
    }
  }

  class World {
    constructor({ rowCount, columnCount }) {
      this.rowCount = rowCount
      this.columnCount = columnCount
      this.worldGrid = Array.from({ length: rowCount }, (_, y) =>
        Array.from({ length: columnCount }, (_, x) =>
          new Cell({ x, y, terrain: 'grassland' })
        )
      )
    }

    at(x, y) {
      return this.worldGrid[y]?.[x] ?? null
    }

    contains(x, y) {
      return (
        y >= 0 &&
        y < this.rowCount &&
        x >= 0 &&
        x < this.columnCount
      )
    }
  }

  // --- Demo logic ---
  const world = new World({ rowCount: 10, columnCount: 10 })

  const gridEl = document.createElement('div')
  gridEl.className = 'grid'
  gridEl.style.gridTemplateColumns = `repeat(${world.columnCount}, 40px)`

  for (let y = 0; y < world.rowCount; y++) {
    for (let x = 0; x < world.columnCount; x++) {
      const cellData = world.at(x, y)

      const cellEl = document.createElement('div')
      cellEl.className = 'cell'

      // simple visualization
      cellEl.textContent = '🌱'

      // debug tooltip
      cellEl.title = `(${x}, ${y})`

      gridEl.appendChild(cellEl)
    }
  }

  document.getElementById('app').appendChild(gridEl)
</script>

</body>
</html>
