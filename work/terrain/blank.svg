<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 704 528" font-family="monospace">
  <style>
    .cell { fill: none; stroke: black; }
    .label { font-size: 10px; }
    .bit { stroke: black; fill: white; }
    .on { fill: black; }
  </style>

  <!-- helper: positions inside cell -->
  <!-- NW(10,10) N(40,10) NE(70,10)
       W(10,40)         E(70,40)
       SW(10,70) S(40,70) SE(70,70) -->

  <!-- functionally copied 47 tiles -->
  <!-- I'll show pattern once, then reuse structure -->

  <!-- TILE TEMPLATE REPEATED -->
