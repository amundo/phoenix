<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameEngine Demo</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 2rem;
      line-height: 1.4;
    }

    h1 {
      margin-top: 0;
    }

    .layout {
      display: grid;
      grid-template-columns: auto 320px;
      gap: 2rem;
      align-items: start;
    }

    .world {
      display: grid;
      gap: 2px;
      background: #ccc;
      padding: 2px;
      width: fit-content;
    }

    .cell {
      width: 48px;
      height: 48px;
      background: #dff3d8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      border: 1px solid #b7d4ad;
      box-sizing: border-box;
    }

    .cell.grassland {
      background: #dff3d8;
    }

    .cell.camera {
      outline: 3px solid #4a90e2;
      outline-offset: -3px;
    }

    .panel {
      border: 1px solid #ddd;
      padding: 1rem;
      border-radius: 8px;
      background: #fafafa;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 60px);
      gap: 0.5rem;
      justify-content: center;
      margin-top: 1rem;
    }

    button {
      padding: 0.75rem;
      font-size: 1rem;
      cursor: pointer;
    }

    pre {
      white-space: pre-wrap;
      background: white;
      border: 1px solid #ddd;
      padding: 0.75rem;
      border-radius: 6px;
      overflow: auto;
    }

    ul {
      padding-left: 1.25rem;
    }

    code {
      background: #f1f1f1;
      padding: 0.1rem 0.3rem;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>GameEngine Demo</h1>
  <p>
    Move the player with the arrow keys or the buttons. This demo shows
    <code>handleCommand()</code>, <code>movePlayerBy()</code>,
    camera centering, world bounds, and effect generation.
  </p>

  <div class="layout">
    <div>
      <div id="world" class="world"></div>

      <div class="controls">
        <div></div>
        <button data-dx="0" data-dy="-1">↑</button>
        <div></div>

        <button data-dx="-1" data-dy="0">←</button>
        <button id="stay">•</button>
        <button data-dx="1" data-dy="0">→</button>

        <div></div>
        <button data-dx="0" data-dy="1">↓</button>
        <div></div>
      </div>
    </div>

    <div class="panel">
      <h2>State</h2>
      <pre id="state"></pre>

      <h2>Last Result</h2>
      <pre id="result"></pre>

      <h2>Effect Log</h2>
      <ul id="effects"></ul>
    </div>
  </div>

  <script type="module">
    class Cell {
      constructor({ x, y, terrain = 'grassland' }) {
        this.x = x
        this.y = y
        this.terrain = terrain
      }
    }

    class RealmMap {
      constructor(gameData) {
        const { rowCount, columnCount } = gameData.realmMap
        this.rowCount = rowCount
        this.columnCount = columnCount

        this.realmMapGrid = Array.from({ length: rowCount }, (_, y) =>
          Array.from({ length: columnCount }, (_, x) =>
            new Cell({ x, y, terrain: 'grassland' })
          )
        )
      }

      at(x, y) {
        return this.realmMapGrid[y]?.[x] ?? null
      }

      contains(x, y) {
        return (
          y >= 0 &&
          y < this.rowCount &&
          x >= 0 &&
          x < this.columnCount
        )
      }
    }

    class Camera {
      constructor({ x = 0, y = 0, rowCount = 5, columnCount = 5 } = {}) {
        this.x = x
        this.y = y
        this.rowCount = rowCount
        this.columnCount = columnCount
      }

      centerOn(x, y, realmMap) {
        const halfWidth = Math.floor(this.columnCount / 2)
        const halfHeight = Math.floor(this.rowCount / 2)

        let nextX = x - halfWidth
        let nextY = y - halfHeight

        nextX = Math.max(0, Math.min(nextX, realmMap.columnCount - this.columnCount))
        nextY = Math.max(0, Math.min(nextY, realmMap.rowCount - this.rowCount))

        this.x = nextX
        this.y = nextY
      }

      contains(x, y) {
        return (
          x >= this.x &&
          x < this.x + this.columnCount &&
          y >= this.y &&
          y < this.y + this.rowCount
        )
      }
    }

    class Entity {
      constructor({ name, emoji, x, y }) {
        this.name = name
        this.emoji = emoji
        this.x = x
        this.y = y
      }

      moveTo({ x, y }) {
        this.x = x
        this.y = y
      }
    }

    class Player extends Entity {}
    class Enemy extends Entity {}
    class Item extends Entity {}

    class GameEngine {
      constructor(gameData) {
        this.initialize(gameData)
      }

      initialize(gameData) {
        console.log('[dev] Initializing game engine with data:', gameData)
        console.log('[dev] Game data realmMap config:', Object.keys(gameData.realmMap))

        this.realmMap = new RealmMap(gameData)
        this.camera = new Camera(gameData.camera)

        this.player = new Player(gameData.entities.player)
        this.enemies = gameData.entities.enemies.map(enemy => new Enemy(enemy))
        this.items = gameData.entities.items.map(item => new Item(item))

        this.camera.centerOn(this.player.x, this.player.y, this.realmMap)
      }

      get entities() {
        return [this.player, ...this.enemies, ...this.items]
      }

      getState() {
        return {
          realmMap: this.realmMap,
          camera: this.camera,
          entities: this.entities,
        }
      }

      handleCommand(command) {
        if (!command) {
          return {
            stateChanged: false,
            effects: [],
          }
        }

        let result = {
          stateChanged: false,
          effects: [],
        }

        if (command.type === 'move') {
          result = this.movePlayerBy(command.dx, command.dy)
        }

        this.camera.centerOn(this.player.x, this.player.y, this.realmMap)
        return result
      }

      movePlayerBy(dx, dy) {
        const effects = []

        const nextX = this.player.x + dx
        const nextY = this.player.y + dy

        if (!this.realmMap.contains(nextX, nextY)) {
          effects.push({
            type: 'speak',
            actor: this.player,
            message: 'Edge of the world!',
          })

          effects.push({
            type: 'emote',
            actor: this.player,
            emotion: '😠',
          })

          return {
            stateChanged: false,
            effects,
          }
        }

        const enemy = this.enemies.find(enemy =>
          enemy.x === nextX && enemy.y === nextY
        )

        if (enemy) {
          effects.push({
            type: 'speak',
            actor: this.player,
            message: `Look out! ${enemy.name}!`,
          })

          return {
            stateChanged: false,
            effects,
          }
        }

        this.player.moveTo({ x: nextX, y: nextY })

        return {
          stateChanged: true,
          effects,
        }
      }
    }

    const gameData = {
      realmMap: {
        rowCount: 8,
        columnCount: 10,
      },
      camera: {
        x: 0,
        y: 0,
        rowCount: 5,
        columnCount: 6,
      },
      entities: {
        player: {
          name: 'Phoenix',
          emoji: '🧝',
          x: 1,
          y: 1,
        },
        enemies: [
          {
            name: 'Goblin',
            emoji: '👺',
            x: 3,
            y: 1,
          },
          {
            name: 'Slime',
            emoji: '🟢',
            x: 6,
            y: 4,
          },
        ],
        items: [
          {
            name: 'Mushroom',
            emoji: '🍄',
            x: 2,
            y: 3,
          },
          {
            name: 'Gem',
            emoji: '💎',
            x: 7,
            y: 2,
          },
        ],
      },
    }

    const engine = new GameEngine(gameData)

    const worldEl = document.getElementById('world')
    const stateEl = document.getElementById('state')
    const resultEl = document.getElementById('result')
    const effectsEl = document.getElementById('effects')

    function getEntityAt(x, y) {
      return engine.entities.find(entity => entity.x === x && entity.y === y) ?? null
    }

    function renderWorld() {
      const { realmMap, camera } = engine.getState()

      worldEl.style.gridTemplateColumns = `repeat(${realmMap.columnCount}, 48px)`

      worldEl.replaceChildren()

      for (let y = 0; y < realmMap.rowCount; y++) {
        for (let x = 0; x < realmMap.columnCount; x++) {
          const cell = realmMap.at(x, y)
          const entity = getEntityAt(x, y)

          const el = document.createElement('div')
          el.className = `cell ${cell.terrain}`

          if (camera.contains(x, y)) {
            el.classList.add('camera')
          }

          el.textContent = entity ? entity.emoji : ''
          el.title = entity
            ? `${entity.name} (${x}, ${y})`
            : `Cell (${x}, ${y})`

          worldEl.append(el)
        }
      }
    }

    function renderState(lastResult = null) {
      const state = engine.getState()

      stateEl.textContent = JSON.stringify(
        {
          player: {
            name: engine.player.name,
            x: engine.player.x,
            y: engine.player.y,
          },
          camera: {
            x: state.camera.x,
            y: state.camera.y,
            rowCount: state.camera.rowCount,
            columnCount: state.camera.columnCount,
          },
          enemies: engine.enemies.map(({ name, x, y }) => ({ name, x, y })),
          items: engine.items.map(({ name, x, y }) => ({ name, x, y })),
        },
        null,
        2
      )

      resultEl.textContent = JSON.stringify(lastResult, null, 2)
    }

    function appendEffects(effects) {
      for (const effect of effects) {
        const li = document.createElement('li')

        if (effect.type === 'speak') {
          li.textContent = `${effect.actor.name} says: "${effect.message}"`
        } else if (effect.type === 'emote') {
          li.textContent = `${effect.actor.name} emotes: ${effect.emotion}`
        } else {
          li.textContent = JSON.stringify(effect)
        }

        effectsEl.prepend(li)
      }
    }

    function runMove(dx, dy) {
      const result = engine.handleCommand({
        type: 'move',
        dx,
        dy,
      })

      renderWorld()
      renderState(result)
      appendEffects(result.effects)
    }

    document.querySelectorAll('[data-dx]').forEach(button => {
      button.addEventListener('click', () => {
        runMove(Number(button.dataset.dx), Number(button.dataset.dy))
      })
    })

    document.getElementById('stay').addEventListener('click', () => {
      const result = engine.handleCommand(null)
      renderWorld()
      renderState(result)
    })

    window.addEventListener('keydown', event => {
      const moves = {
        ArrowUp: [0, -1],
        ArrowDown: [0, 1],
        ArrowLeft: [-1, 0],
        ArrowRight: [1, 0],
      }

      const move = moves[event.key]
      if (!move) return

      event.preventDefault()
      runMove(move[0], move[1])
    })

    renderWorld()
    renderState({
      stateChanged: false,
      effects: [],
    })
</script>
</body>
</html>
