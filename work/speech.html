<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>speech</title>
  <style>
    body {
      margin: 0;
      padding: 3rem;
      min-height: 100vh;
    }

    .scene {
      position: relative;
      width: 500px;
      height: 300px;
      border: 1px solid #ccc;
    }

    .character {
      position: absolute;
      left: 4rem;
      top: 4rem;
      font-size: 3rem;
      anchor-name: --char;
    }

    .speech {
      position: absolute;
      position-anchor: --char;

      top: anchor(top);
      left: calc(anchor(right) + 8px);

      background: white;
      border: 2px solid black;
      padding: 0.5rem 0.75rem;
      border-radius: 0.75rem;
      max-width: 12rem;
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="character">🧙</div>
    <div class="speech">Hello there!</div>
  </div>
</body>
</html>
