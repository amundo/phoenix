<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realm Editor</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext x='0' y='14'%3E%F0%9F%8C%8D%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --page-bg: #d9d1cc;
      --panel-bg: #f8f7f5;
      --line: #a9a19a;
      --text: #171412;
      --muted: #5a534d;
      --grid-bg: #128789;
      --grid-line: rgb(255 255 255 / 0.46);
      --tile-size: 70px;
      --columns: 8;
      --rows: 6;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: ui-rounded, "SF Pro Rounded", "Hiragino Maru Gothic ProN", sans-serif;
      background: var(--page-bg);
      color: var(--text);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 1rem;
      padding: 1.4rem 1.4rem 1.2rem;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr 26rem;
      gap: 2rem;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 0.25rem;
    }

    .field input {
      border: none;
      border-bottom: 5px solid var(--line);
      background: white;
      padding: 0.2rem 0.1rem 0.35rem;
      font-size: 1.9rem;
      font-style: italic;
      outline: none;
      color: inherit;
    }

    .field input::placeholder {
      color: #9c958e;
    }

    .main {
      display: grid;
      grid-template-columns: minmax(22rem, 1fr) minmax(32rem, 1fr);
      gap: 1rem;
      min-height: 0;
    }

    .panel {
      background: rgb(255 255 255 / 0.26);
      border: 1px solid rgb(255 255 255 / 0.45);
      min-height: 0;
    }

    .editor-panel {
      display: grid;
      grid-template-rows: 1fr auto auto;
      gap: 1rem;
      padding: 1rem;
    }

    textarea {
      width: 100%;
      min-height: 0;
      resize: none;
      padding: 1rem;
      border: none;
      background: white;
      color: #171412;
      font: 1rem/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
      outline: none;
    }

    .picker-row {
      display: grid;
      grid-template-columns: 12rem auto;
      gap: 0.75rem;
      align-items: center;
    }

    .search {
      border: none;
      background: transparent;
      padding: 0.35rem 0;
      outline: none;
      font-size: 1.05rem;
      font-style: italic;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .tab {
      border: none;
      border-radius: 0.5rem;
      background: rgb(255 255 255 / 0.7);
      padding: 0.45rem 0.8rem;
      cursor: pointer;
      color: inherit;
    }

    .tab.active {
      background: white;
      box-shadow: inset 0 0 0 2px rgb(23 20 18 / 0.12);
    }

    .status {
      min-height: 1.4rem;
      color: #7b1c1c;
      font-size: 0.95rem;
    }

    .preview-panel {
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 1rem;
      padding: 1.2rem;
    }

    .board-wrap {
      display: grid;
      place-items: center;
      min-height: 0;
    }

    .board-frame {
      display: grid;
      grid-template-columns: 2.1rem auto;
      grid-template-rows: 2.1rem auto;
      gap: 0.35rem;
      align-items: start;
      justify-items: start;
    }

    .corner {
      width: 2.1rem;
      height: 2.1rem;
    }

    .axis-top,
    .axis-left {
      display: grid;
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 650;
    }

    .axis-top {
      width: calc(var(--columns) * var(--tile-size));
      grid-template-columns: repeat(var(--columns), var(--tile-size));
      justify-items: center;
      align-items: end;
      padding-bottom: 0.35rem;
    }

    .axis-left {
      height: calc(var(--rows) * var(--tile-size));
      grid-template-rows: repeat(var(--rows), var(--tile-size));
      align-items: center;
      justify-items: center;
      padding-right: 0.35rem;
    }

    .board {
      position: relative;
      width: calc(var(--columns) * var(--tile-size));
      height: calc(var(--rows) * var(--tile-size));
      background: var(--grid-bg);
      border: 5px solid var(--line);
      border-radius: 0.25rem;
      overflow: hidden;
    }

    .grid {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(var(--columns), var(--tile-size));
      grid-template-rows: repeat(var(--rows), var(--tile-size));
      pointer-events: none;
    }

    .cell {
      border-right: 2px solid var(--grid-line);
      border-bottom: 2px solid var(--grid-line);
    }

    .cell:nth-child(8n) {
      border-right: none;
    }

    .cell:nth-last-child(-n + 8) {
      border-bottom: none;
    }

    .entity {
      position: absolute;
      width: var(--tile-size);
      height: var(--tile-size);
      display: grid;
      place-items: center;
      transform: translate(-50%, -50%);
      line-height: 1;
      user-select: none;
    }

    .entity span {
      font-size: calc(var(--tile-size) * 0.65);
      filter: drop-shadow(0 0.18rem 0.14rem rgb(0 0 0 / 0.16));
    }

    .speech {
      position: absolute;
      bottom: calc(100% + 0.25rem);
      left: 50%;
      transform: translateX(-50%);
      max-width: 10rem;
      padding: 0.38rem 0.55rem;
      border-radius: 0.8rem;
      border: 1px solid rgb(0 0 0 / 0.12);
      background: white;
      font-size: 0.76rem;
      line-height: 1.2;
      text-align: center;
      box-shadow: 0 0.45rem 1rem rgb(0 0 0 / 0.1);
    }

    .speech::after {
      content: "";
      position: absolute;
      top: calc(100% - 0.18rem);
      left: 50%;
      width: 0.55rem;
      height: 0.55rem;
      background: white;
      border-right: 1px solid rgb(0 0 0 / 0.12);
      border-bottom: 1px solid rgb(0 0 0 / 0.12);
      transform: translateX(-50%) rotate(45deg);
    }

    .actions {
      display: flex;
      justify-content: flex-end;
    }

    .save-button {
      border: none;
      border-radius: 0.5rem;
      background: rgb(255 255 255 / 0.82);
      padding: 0.55rem 1.1rem;
      font-size: 1rem;
      cursor: pointer;
      color: inherit;
    }

    dialog {
      border: none;
      border-radius: 1rem;
      padding: 0;
      width: min(28rem, calc(100vw - 2rem));
      box-shadow: 0 1.4rem 4rem rgb(0 0 0 / 0.22);
    }

    dialog::backdrop {
      background: rgb(14 12 11 / 0.38);
    }

    .dialog-shell {
      padding: 1rem;
      display: grid;
      gap: 0.8rem;
      text-align: center;
      background: var(--panel-bg);
    }

    .dialog-shell h2,
    .dialog-shell p {
      margin: 0;
    }

    .emoji-dialog {
      width: min(42rem, calc(100vw - 2rem));
    }

    .emoji-dialog-shell {
      padding: 1rem;
      display: grid;
      gap: 0.9rem;
      background: var(--panel-bg);
      min-height: 28rem;
    }

    .emoji-dialog-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.75rem;
      align-items: center;
    }

    .emoji-reference-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(10.5rem, 1fr));
      gap: 0.5rem;
      align-content: start;
      overflow: auto;
      min-height: 0;
    }

    .emoji-reference-row {
      display: grid;
      grid-template-columns: 1.6rem 1fr;
      gap: 0.45rem;
      align-items: center;
      padding: 0.45rem 0.55rem;
      border-radius: 0.6rem;
      background: rgb(255 255 255 / 0.78);
      cursor: pointer;
    }

    .emoji-reference-row .glyph {
      font-size: 1.15rem;
      line-height: 1;
      text-align: center;
    }

    .emoji-reference-row .label {
      font-size: 0.92rem;
      word-break: break-word;
    }

    #qrCanvas,
    #qrImage {
      width: 280px;
      height: 280px;
      max-width: 100%;
      background: white;
      border-radius: 0.8rem;
      object-fit: contain;
      justify-self: center;
    }

    .dialog-actions {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
    }

    .dialog-actions button {
      border: none;
      border-radius: 999px;
      background: white;
      padding: 0.55rem 0.9rem;
      cursor: pointer;
      color: inherit;
    }

    #qrText {
      display: none;
    }

    @media (max-width: 1100px) {
      .topbar,
      .main {
        grid-template-columns: 1fr;
      }

      .preview-panel {
        overflow: auto;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
</head>
<body>
  <div class="app">
    <section class="topbar">
      <label class="field">
        <input id="realmTitle" type="text" placeholder="Type your realm name here" aria-label="Realm name" />
      </label>
      <label class="field">
        <input id="playerName" type="text" placeholder="Type your first name here" aria-label="Player name" />
      </label>
    </section>

    <section class="main">
      <section class="panel editor-panel">
        <textarea id="source" spellcheck="false"><realm background=teal>

<player emoji=child x=1 y=4>
</player>

<bot emoji=wizard x=5 y=1>
  <speech>Hello!</speech>
</bot>

<item emoji=key x=3 y=2>
</item>

<item emoji=door x=6 y=1>
</item>

</realm></textarea>

        <div>
          <button class="tab" id="openEmojiReference" type="button">Open emoji reference</button>
          <div class="status" id="status"></div>
        </div>
      </section>

      <section class="panel preview-panel">
        <div class="board-wrap">
          <div class="board-frame">
            <div class="corner"></div>
            <div class="axis-top" id="axisTop"></div>
            <div class="axis-left" id="axisLeft"></div>
            <div class="board" id="board">
              <div class="grid" id="grid"></div>
            </div>
          </div>
        </div>

        <div class="actions">
          <button class="save-button" id="saveButton" type="button">Save</button>
        </div>
      </section>
    </section>
  </div>

  <dialog id="qrDialog">
    <div class="dialog-shell">
      <h2>Save This Realm</h2>
      <p>Scan this QR code to collect the student’s finished realm.</p>
      <canvas id="qrCanvas" width="280" height="280" hidden></canvas>
      <img id="qrImage" alt="Realm QR code" hidden />
      <div id="qrStatus"></div>
      <textarea id="qrText" readonly></textarea>
      <div class="dialog-actions">
        <button id="copyExport" type="button">Copy Export</button>
        <button id="closeDialog" type="button">Close</button>
      </div>
    </div>
  </dialog>

  <dialog id="emojiDialog" class="emoji-dialog" closedby="any">
    <div class="emoji-dialog-shell">
      <div class="emoji-dialog-top">
        <div>
          <h2>Emoji Reference</h2>
          <p>Click a name to copy it.</p>
        </div>
        <button id="closeEmojiDialog" type="button">Close</button>
      </div>

      <div class="picker-row">
        <input id="emojiDialogSearch" class="search" type="text" placeholder="Search emojis:" aria-label="Search emoji names" />
        <div class="tabs" id="dialogTabs">
          <button class="tab active" type="button" data-role="player">😀 Player</button>
          <button class="tab" type="button" data-role="item">🗝 Item</button>
          <button class="tab" type="button" data-role="bot">🧙 Bot</button>
        </div>
      </div>

      <div id="emojiCopyStatus"></div>
      <div class="emoji-reference-list" id="emojiReferenceList"></div>
    </div>
  </dialog>

  <script type="module">
    import {
      DEFAULT_COLUMNS,
      DEFAULT_ROWS,
      compileRealm,
      parseRealmMarkup,
      slugify,
    } from './editor/realmMarkup.js'

    const FALLBACK_EMOJI = {
      player: [
        { emoji: '🧒', label: 'child' },
        { emoji: '👧', label: 'girl' },
        { emoji: '👦', label: 'boy' },
        { emoji: '🐶', label: 'dog' },
        { emoji: '🐱', label: 'cat' },
        { emoji: '🧙', label: 'wizard' },
        { emoji: '🧚', label: 'fairy' },
        { emoji: '🧝', label: 'elf' },
      ],
      item: [
        { emoji: '🗝️', label: 'key' },
        { emoji: '🚪', label: 'door' },
        { emoji: '📜', label: 'scroll' },
        { emoji: '🌼', label: 'flower' },
        { emoji: '🍎', label: 'apple' },
        { emoji: '🏮', label: 'lantern' },
        { emoji: '🪙', label: 'coin' },
        { emoji: '🔮', label: 'crystal-ball' },
      ],
      bot: [
        { emoji: '🧙', label: 'wizard' },
        { emoji: '🤖', label: 'robot' },
        { emoji: '🐉', label: 'dragon' },
        { emoji: '👻', label: 'ghost' },
        { emoji: '🦊', label: 'fox' },
        { emoji: '🐸', label: 'frog' },
        { emoji: '🦉', label: 'owl' },
        { emoji: '🦄', label: 'unicorn' },
      ],
    }

    const realmTitle = document.querySelector('#realmTitle')
    const playerName = document.querySelector('#playerName')
    const source = document.querySelector('#source')
    const status = document.querySelector('#status')
    const board = document.querySelector('#board')
    const grid = document.querySelector('#grid')
    const axisTop = document.querySelector('#axisTop')
    const axisLeft = document.querySelector('#axisLeft')
    const saveButton = document.querySelector('#saveButton')

    const qrDialog = document.querySelector('#qrDialog')
    const qrCanvas = document.querySelector('#qrCanvas')
    const qrImage = document.querySelector('#qrImage')
    const qrStatus = document.querySelector('#qrStatus')
    const qrText = document.querySelector('#qrText')
    const emojiDialog = document.querySelector('#emojiDialog')
    const emojiDialogSearch = document.querySelector('#emojiDialogSearch')
    const emojiReferenceList = document.querySelector('#emojiReferenceList')
    const dialogTabs = document.querySelector('#dialogTabs')
    const emojiCopyStatus = document.querySelector('#emojiCopyStatus')

    let activeRole = 'player'
    let emojiCatalog = { player: FALLBACK_EMOJI.player, item: FALLBACK_EMOJI.item, bot: FALLBACK_EMOJI.bot }
    let emojiAliases = new Map()
    let latestRealm = null

    buildAxes()
    buildGrid()
    bindEvents()
    await loadEmojiCatalog()
    renderEmojiReference()
    render()

    function bindEvents() {
      realmTitle.addEventListener('input', render)
      playerName.addEventListener('input', render)
      source.addEventListener('input', render)
      dialogTabs.addEventListener('click', event => {
        const button = event.target.closest('[data-role]')
        if (!button) return
        activeRole = button.dataset.role
        dialogTabs.querySelectorAll('.tab').forEach(tab => tab.classList.toggle('active', tab === button))
        renderEmojiReference()
      })
      emojiDialogSearch.addEventListener('input', renderEmojiReference)
      document.querySelector('#openEmojiReference').addEventListener('click', () => {
        renderEmojiReference()
        emojiDialog.showModal()
      })
      document.querySelector('#closeEmojiDialog').addEventListener('click', () => emojiDialog.close())
      saveButton.addEventListener('click', showQrDialog)
      document.querySelector('#copyExport').addEventListener('click', async () => {
        if (!latestRealm) return
        await navigator.clipboard.writeText(JSON.stringify(latestRealm))
        qrStatus.textContent = 'Export copied.'
      })
      document.querySelector('#closeDialog').addEventListener('click', () => qrDialog.close())
    }

    async function loadEmojiCatalog() {
      try {
        const response = await fetch('./data/catalogs/emoji.json')
        if (!response.ok) throw new Error('Could not load emoji catalog.')
        const items = await response.json()
        emojiCatalog = {
          player: buildPickerEntries(items, 'emoji-player'),
          item: buildPickerEntries(items, 'emoji-item'),
          bot: buildPickerEntries(items, 'emoji-bot'),
        }
        emojiAliases = buildAliasMap(items)
      } catch {
        emojiAliases = buildAliasMap(
          Object.values(FALLBACK_EMOJI)
            .flat()
            .map(entry => ({
              emoji: entry.emoji,
              description: entry.label,
              keywords: [entry.label],
            }))
        )
      }
    }

    function buildPickerEntries(items, tag) {
      return items
        .filter(item => item.tags?.includes(tag))
        .map(item => ({
          emoji: item.emoji,
          label: slugify(item.description || item.keywords?.[0] || item.emoji),
          description: item.description || item.keywords?.[0] || item.emoji,
        }))
        .filter(entry => entry.label)
        .filter((entry, index, array) => array.findIndex(other => other.emoji === entry.emoji) === index)
        .slice(0, 160)
    }

    function buildAliasMap(items) {
      const aliases = new Map()

      for (const item of items) {
        const description = slugify(item.description || '')
        if (description && !aliases.has(description)) {
          aliases.set(description, item.emoji)
        }
      }

      for (const item of items) {
        for (const keyword of item.keywords || []) {
          const alias = slugify(keyword)
          if (alias && !aliases.has(alias)) {
            aliases.set(alias, item.emoji)
          }
        }
      }

      return aliases
    }

    function render() {
      clearEntities()
      try {
        const parsed = parseRealmMarkup(source.value, {
          title: realmTitle.value,
          playerName: playerName.value,
          emojiAliases,
        })
        latestRealm = compileRealm(parsed)
        renderBoard(parsed)
        status.textContent = ''
      } catch (error) {
        latestRealm = null
        status.textContent = error.message
      }
    }

    function renderBoard(parsed) {
      board.style.backgroundColor = parsed.background || 'var(--grid-bg)'
      const entities = [parsed.player, ...parsed.bots, ...parsed.items]
      for (const entity of entities) {
        board.append(renderEntity(entity))
      }
    }

    function renderEntity(entity) {
      const el = document.createElement('div')
      el.className = 'entity'
      el.style.left = `${entity.x * getTileSize() + getTileSize() / 2}px`
      el.style.top = `${entity.y * getTileSize() + getTileSize() / 2}px`

      const glyph = document.createElement('span')
      glyph.textContent = entity.emoji
      el.append(glyph)

      if (entity.speech) {
        const speech = document.createElement('div')
        speech.className = 'speech'
        speech.textContent = entity.speech
        el.append(speech)
      }

      return el
    }

    function buildAxes() {
      axisTop.replaceChildren()
      axisLeft.replaceChildren()

      for (let x = 0; x < DEFAULT_COLUMNS; x++) {
        const cell = document.createElement('div')
        cell.textContent = x
        axisTop.append(cell)
      }

      for (let y = 0; y < DEFAULT_ROWS; y++) {
        const cell = document.createElement('div')
        cell.textContent = y
        axisLeft.append(cell)
      }
    }

    function buildGrid() {
      grid.replaceChildren()
      for (let i = 0; i < DEFAULT_COLUMNS * DEFAULT_ROWS; i++) {
        const cell = document.createElement('div')
        cell.className = 'cell'
        grid.append(cell)
      }
    }

    function renderEmojiReference() {
      emojiReferenceList.replaceChildren()
      const query = slugify(emojiDialogSearch.value)
      const entries = (emojiCatalog[activeRole] || FALLBACK_EMOJI[activeRole] || [])
        .filter(entry => !query || entry.label.includes(query) || slugify(entry.description || '').includes(query))
        .slice(0, 160)

      for (const entry of entries) {
        const row = document.createElement('div')
        row.className = 'emoji-reference-row'
        row.innerHTML = `<span class="glyph">${entry.emoji}</span><span class="label">${entry.label}</span>`
        row.addEventListener('click', async () => {
          await navigator.clipboard.writeText(entry.label)
          emojiCopyStatus.textContent = `Copied "${entry.label}".`
        })
        emojiReferenceList.append(row)
      }
    }

    async function showQrDialog() {
      if (!latestRealm) return

      const payload = JSON.stringify(latestRealm)
      qrText.value = payload
      qrStatus.textContent = 'Preparing QR code…'
      qrCanvas.hidden = true
      qrImage.hidden = true
      qrDialog.showModal()

      try {
        if (window.QRCode?.toCanvas) {
          await window.QRCode.toCanvas(qrCanvas, payload, {
            margin: 1,
            width: 280,
            errorCorrectionLevel: 'M',
            color: {
              dark: '#171412',
              light: '#ffffff',
            },
          })
          qrCanvas.hidden = false
          qrStatus.textContent = 'Scan to save this realm.'
          return
        }

        qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(payload)}`
        qrImage.hidden = false
        qrStatus.textContent = 'Scan to save this realm.'
      } catch (error) {
        qrStatus.textContent = `Could not generate QR code: ${error.message}`
      }
    }

    function clearEntities() {
      board.querySelectorAll('.entity').forEach(entity => entity.remove())
    }

    function getTileSize() {
      return board.getBoundingClientRect().width / DEFAULT_COLUMNS
    }
  </script>
</body>
</html>
