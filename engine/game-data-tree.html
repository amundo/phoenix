<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Data Loader Demo</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20width%3D'48'%20height%3D'48'%20viewBox%3D'0%200%2016%2016'%3E%3Ctext%20x%3D'0'%20y%3D'14'%3E%F0%9F%93%A6%3C%2Ftext%3E%3C%2Fsvg%3E" />
  <style>
    body {
      font-family: sans-serif;
      line-height: 1.4;
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin-top: 0;
    }

    .status {
      padding: 0.75rem 1rem;
      border: 1px solid #ccc;
      border-radius: 0.5rem;
      background: #f7f7f7;
      margin-bottom: 1rem;
      white-space: pre-wrap;
    }

    .tree {
      font-family: monospace;
      font-size: 0.95rem;
    }

    details {
      margin-left: 1rem;
    }

    summary {
      cursor: pointer;
    }

    .leaf {
      margin-left: 2rem;
      padding: 0.1rem 0;
    }

    .key {
      font-weight: bold;
    }

    .type {
      color: #666;
    }

    .string {
      color: #0a5;
    }

    .number {
      color: #06c;
    }

    .boolean {
      color: #a50;
    }

    .null {
      color: #999;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>Game Data Loader Demo</h1>
  <p>This page loads your game data and renders it as an expandable tree.</p>

  <div class="status" id="status">Loading…</div>
  <div class="tree" id="tree"></div>

  <script type="module">
    import { GameDataLoader } from './GameDataLoader.js';

    const status = document.querySelector('#status');
    const tree = document.querySelector('#tree');

    function formatPrimitive(value) {
      if (value === null) {
        const span = document.createElement('span');
        span.className = 'null';
        span.textContent = 'null';
        return span;
      }

      const span = document.createElement('span');

      switch (typeof value) {
        case 'string':
          span.className = 'string';
          span.textContent = JSON.stringify(value);
          return span;

        case 'number':
          span.className = 'number';
          span.textContent = String(value);
          return span;

        case 'boolean':
          span.className = 'boolean';
          span.textContent = String(value);
          return span;

        default:
          span.textContent = String(value);
          return span;
      }
    }

    function describeValue(value) {
      if (Array.isArray(value)) {
        return `Array(${value.length})`;
      }

      if (value && typeof value === 'object') {
        return `Object(${Object.keys(value).length})`;
      }

      if (value === null) {
        return 'null';
      }

      return typeof value;
    }

    function makeNode(key, value) {
      const isObject = value && typeof value === 'object';

      if (!isObject) {
        const div = document.createElement('div');
        div.className = 'leaf';

        const keySpan = document.createElement('span');
        keySpan.className = 'key';
        keySpan.textContent = `${key}: `;

        div.append(keySpan, formatPrimitive(value));
        return div;
      }

      const details = document.createElement('details');
      details.open = key === 'gameData';

      const summary = document.createElement('summary');

      const keySpan = document.createElement('span');
      keySpan.className = 'key';
      keySpan.textContent = key;

      const typeSpan = document.createElement('span');
      typeSpan.className = 'type';
      typeSpan.textContent = ` — ${describeValue(value)}`;

      summary.append(keySpan, typeSpan);
      details.append(summary);

      if (Array.isArray(value)) {
        value.forEach((item, index) => {
          details.append(makeNode(index, item));
        });
      } else {
        for (const [childKey, childValue] of Object.entries(value)) {
          details.append(makeNode(childKey, childValue));
        }
      }

      return details;
    }

    async function main() {
      try {
        const dataRoot = new URL('../data/', import.meta.url);
        const loader = new GameDataLoader(dataRoot);

        const gameData = await loader.loadGameData();
        status.textContent = [
          'Loaded successfully.',
          `Title: ${gameData.world?.title ?? '(no title)'}`,
          `Starting realm: ${gameData.world?.startingRealm ?? '(none)'}`,
          `Catalogs: ${Object.keys(gameData.catalogs ?? {}).join(', ')}`
        ].join('\n');

        tree.replaceChildren(makeNode('gameData', gameData));
      } catch (error) {
        console.error(error);
        status.textContent = `Error loading game data:\n\n${error.message}`;
      }
    }

    main();
  </script>
</body>
</html>
