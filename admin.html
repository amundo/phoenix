<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20width%3D'48'%20height%3D'48'%20viewBox%3D'0%200%2016%2016'%3E%3Ctext%20x%3D'0'%20y%3D'14'%3E%F0%9F%93%A6%3C%2Ftext%3E%3C%2Fsvg%3E" />
  <style>
    body {
      font-family: sans-serif;
      line-height: 1.4;
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin-top: 0;
    }

    .status {
      padding: 0.75rem 1rem;
      border: 1px solid #ccc;
      border-radius: 0.5rem;
      background: #f7f7f7;
      margin-bottom: 1rem;
      white-space: pre-wrap;
    }

    .tree {
      font-family: monospace;
      font-size: 0.95rem;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-family: monospace;
      font-size: 0.92rem;
      background: white;
    }

    th,
    td {
      padding: 0.45rem 0.6rem;
      border: 1px solid #d6dde6;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #eef3f8;
      position: sticky;
      top: 0;
    }

    .catalogs {
      margin-bottom: 1.5rem;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .toolbar label {
      font-weight: 600;
    }

    .toolbar select {
      font: inherit;
      padding: 0.4rem 0.6rem;
      border: 1px solid #c7ced6;
      border-radius: 0.5rem;
      background: white;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .tab-button {
      border: 1px solid #c7ced6;
      border-radius: 999px;
      background: #fff;
      color: #234;
      padding: 0.45rem 0.8rem;
      font: inherit;
      cursor: pointer;
    }

    .tab-button[aria-selected="true"] {
      background: #234;
      color: #fff;
      border-color: #234;
    }

    .tab-panel {
      border: 1px solid #d6dde6;
      border-radius: 0.75rem;
      background: #fbfcfe;
      padding: 1rem;
    }

    .catalog-summary {
      color: #5a6573;
      margin-bottom: 0.75rem;
    }

    details {
      margin-left: 1rem;
    }

    summary {
      cursor: pointer;
    }

    .leaf {
      margin-left: 2rem;
      padding: 0.1rem 0;
    }

    .key {
      font-weight: bold;
    }

    .type {
      color: #666;
    }

    .string {
      color: #0a5;
    }

    .number {
      color: #06c;
    }

    .boolean {
      color: #a50;
    }

    .null {
      color: #999;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>Admin</h1>

  <div class="status" id="status">Loading…</div>
  <div class="toolbar">
    <label for="realm-select">Realm</label>
    <select id="realm-select"></select>
  </div>
  <section class="catalogs" id="catalogs" hidden>
    <h2>Catalogs</h2>
    <div class="tabs" id="catalog-tabs" role="tablist" aria-label="Catalogs"></div>
    <div class="tab-panel">
      <div class="catalog-summary" id="catalog-summary"></div>
      <div class="tree" id="catalog-tree"></div>
    </div>
  </section>
  <h2>Game Data</h2>
  <div class="tree" id="tree"></div>

  <script type="module">
    import { GameDataLoader } from './engine/GameDataLoader.js';

    const status = document.querySelector('#status');
    const tree = document.querySelector('#tree');
    const catalogsSection = document.querySelector('#catalogs');
    const catalogTabs = document.querySelector('#catalog-tabs');
    const catalogSummary = document.querySelector('#catalog-summary');
    const catalogTree = document.querySelector('#catalog-tree');
    const realmSelect = document.querySelector('#realm-select');

    function formatPrimitive(value) {
      if (value === null) {
        const span = document.createElement('span');
        span.className = 'null';
        span.textContent = 'null';
        return span;
      }

      const span = document.createElement('span');

      switch (typeof value) {
        case 'string':
          span.className = 'string';
          span.textContent = JSON.stringify(value);
          return span;

        case 'number':
          span.className = 'number';
          span.textContent = String(value);
          return span;

        case 'boolean':
          span.className = 'boolean';
          span.textContent = String(value);
          return span;

        default:
          span.textContent = String(value);
          return span;
      }
    }

    function describeValue(value) {
      if (Array.isArray(value)) {
        return `Array(${value.length})`;
      }

      if (value && typeof value === 'object') {
        return `Object(${Object.keys(value).length})`;
      }

      if (value === null) {
        return 'null';
      }

      return typeof value;
    }

    function makeNode(key, value) {
      const isObject = value && typeof value === 'object';

      if (!isObject) {
        const div = document.createElement('div');
        div.className = 'leaf';

        const keySpan = document.createElement('span');
        keySpan.className = 'key';
        keySpan.textContent = `${key}: `;

        div.append(keySpan, formatPrimitive(value));
        return div;
      }

      if (shouldRenderAsTable(value)) {
        const details = document.createElement('details');
        details.open = true;

        const summary = document.createElement('summary');

        const keySpan = document.createElement('span');
        keySpan.className = 'key';
        keySpan.textContent = key;

        const typeSpan = document.createElement('span');
        typeSpan.className = 'type';
        typeSpan.textContent = ` — ${describeValue(value)}`;

        summary.append(keySpan, typeSpan);
        details.append(summary, makeTable(value));
        return details;
      }

      const details = document.createElement('details');
      details.open = key === 'gameData';

      const summary = document.createElement('summary');

      const keySpan = document.createElement('span');
      keySpan.className = 'key';
      keySpan.textContent = key;

      const typeSpan = document.createElement('span');
      typeSpan.className = 'type';
      typeSpan.textContent = ` — ${describeValue(value)}`;

      summary.append(keySpan, typeSpan);
      details.append(summary);

      if (Array.isArray(value)) {
        value.forEach((item, index) => {
          details.append(makeNode(index, item));
        });
      } else {
        for (const [childKey, childValue] of Object.entries(value)) {
          details.append(makeNode(childKey, childValue));
        }
      }

      return details;
    }

    function isPlainObject(value) {
      return Boolean(value) && typeof value === 'object' && !Array.isArray(value);
    }

    function shouldRenderAsTable(value) {
      if (!Array.isArray(value) || value.length === 0) return false;
      if (!value.every(isPlainObject)) return false;

      const keys = getSharedKeys(value);
      return keys.length > 0;
    }

    function getSharedKeys(rows) {
      const keys = new Set();
      rows.forEach(row => {
        Object.keys(row).forEach(key => keys.add(key));
      });

      return [...keys];
    }

    function formatCellValue(value) {
      if (value === null) return 'null';
      if (Array.isArray(value) || isPlainObject(value)) {
        return JSON.stringify(value);
      }

      return String(value);
    }

    function makeTable(rows) {
      const columns = getSharedKeys(rows);
      const wrap = document.createElement('div');
      wrap.className = 'table-wrap';

      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const tbody = document.createElement('tbody');
      const headRow = document.createElement('tr');

      const indexHead = document.createElement('th');
      indexHead.textContent = '(index)';
      headRow.append(indexHead);

      columns.forEach(column => {
        const th = document.createElement('th');
        th.textContent = column;
        headRow.append(th);
      });

      thead.append(headRow);

      rows.forEach((row, index) => {
        const tr = document.createElement('tr');

        const indexCell = document.createElement('td');
        indexCell.textContent = String(index);
        tr.append(indexCell);

        columns.forEach(column => {
          const td = document.createElement('td');
          td.textContent = formatCellValue(row[column]);
          tr.append(td);
        });

        tbody.append(tr);
      });

      table.append(thead, tbody);
      wrap.append(table);
      return wrap;
    }

    function getCatalogItems(catalog) {
      if (!catalog) return [];
      if (typeof catalog.values === 'function') {
        return catalog.values();
      }

      return Array.from(catalog);
    }

    function renderCatalogTabs(catalogs) {
      const entries = Object.entries(catalogs ?? {});
      if (!entries.length) return;

      catalogsSection.hidden = false;
      catalogTabs.replaceChildren();

      const panelsByName = new Map(entries);

      function selectTab(name) {
        const catalog = panelsByName.get(name);
        if (!catalog) return;

        for (const button of catalogTabs.querySelectorAll('.tab-button')) {
          button.setAttribute('aria-selected', String(button.dataset.catalog === name));
        }

        const items = getCatalogItems(catalog);
        catalogSummary.textContent = `${name} catalog · ${items.length} item${items.length === 1 ? '' : 's'}`;
        catalogTree.replaceChildren(makeNode(name, items));
      }

      entries.forEach(([name], index) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'tab-button';
        button.dataset.catalog = name;
        button.setAttribute('role', 'tab');
        button.setAttribute('aria-selected', 'false');
        button.textContent = name;
        button.addEventListener('click', () => selectTab(name));
        catalogTabs.append(button);

        if (index === 0) {
          selectTab(name);
        }
      });
    }

    function renderGameData(gameData) {
      status.textContent = [
        'Loaded successfully.',
        `World startRealm: ${gameData.world?.startRealm ?? '(none)'}`,
        `Loaded realm: ${gameData.realm?.id ?? '(none)'}`,
        `Catalogs: ${Object.keys(gameData.catalogs ?? {}).join(', ')}`
      ].join('\n');

      renderCatalogTabs(gameData.catalogs);
      tree.replaceChildren(makeNode('gameData', gameData));
    }

    function buildGameData(sharedData, realm) {
      return {
        ...sharedData,
        realm,
      };
    }

    async function main() {
      try {
        const dataRoot = new URL('./data/', import.meta.url);
        const loader = new GameDataLoader(dataRoot);
        const [index, sharedData] = await Promise.all([
          loader.loadIndex(),
          loader.loadSharedData(),
        ]);

        const realmNames = Object.keys(index.realms ?? {});
        const defaultRealm = sharedData.world?.startRealm ?? realmNames[0] ?? '';

        realmSelect.replaceChildren(
          ...realmNames.map(realmName => {
            const option = document.createElement('option');
            option.value = realmName;
            option.textContent = realmName;
            return option;
          })
        );

        async function loadSelectedRealm(realmName) {
          status.textContent = `Loading realm ${realmName}…`;
          const realm = await loader.loadRealm(realmName);
          renderGameData(buildGameData(sharedData, realm));
        }

        realmSelect.value = defaultRealm;
        realmSelect.addEventListener('change', event => {
          loadSelectedRealm(event.target.value).catch(error => {
            console.error(error);
            status.textContent = `Error loading realm:\n\n${error.message}`;
          });
        });

        await loadSelectedRealm(defaultRealm);
      } catch (error) {
        console.error(error);
        status.textContent = `Error loading game data:\n\n${error.message}`;
      }
    }

    main();
  </script>
</body>
</html>
