<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speech Bubble Playground</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
      display: grid;
      gap: 2rem;
      background: #f7f7f7;
    }

    .controls {
      display: grid;
      gap: 1rem;
      max-width: 30rem;
      padding: 1rem;
      background: white;
      border: 1px solid #ccc;
      border-radius: 1rem;
    }

    .control {
      display: grid;
      gap: 0.35rem;
    }

    .control label {
      font-weight: 600;
    }

    .control output {
      font-size: 0.9rem;
      color: #555;
    }

    input[type="text"],
    select,
    button {
      font: inherit;
      padding: 0.5rem 0.75rem;
    }

    speech-bubble {
      display: inline-block;
      justify-self: start;
      padding: 1rem 1.25rem;
      border: 2px solid black;
      border-radius: 1rem;
      background: white;
      font-size: 2rem;
      line-height: 1.3;
      box-shadow: 0 2px 10px rgb(0 0 0 / 0.08);
    }

    speech-bubble span {
      display: inline-block;
      white-space: pre;
    }
  </style>
</head>

<body>

  <div class="controls">
    <div class="control">
      <label for="text">Text</label>
      <input id="text" type="text" value="this is some text">
    </div>

    <div class="control">
      <label for="animation">Animation</label>
      <select id="animation">
        <option value="float-down">float-down</option>
        <option value="float-up">float-up</option>
      </select>
    </div>

    <div class="control">
      <label for="stagger">Stagger</label>
      <input id="stagger" type="range" min="0" max="200" step="5" value="50">
      <output for="stagger" id="stagger-value">50 ms</output>
    </div>

    <div class="control">
      <label for="duration">Duration</label>
      <input id="duration" type="range" min="50" max="1000" step="10" value="220">
      <output for="duration" id="duration-value">220 ms</output>
    </div>

    <div class="control">
      <label for="distance">Distance</label>
      <input id="distance" type="range" min="0" max="2" step="0.05" value="0.7">
      <output for="distance" id="distance-value">0.7 em</output>
    </div>

    <div class="control">
      <label for="easing">Easing</label>
      <select id="easing">
        <option value="ease-out">ease-out</option>
        <option value="ease-in">ease-in</option>
        <option value="ease-in-out">ease-in-out</option>
        <option value="linear">linear</option>
      </select>
    </div>

    <button id="replay">Replay</button>
  </div>

  <speech-bubble id="demo" animation="float-down" stagger="50" duration="220" distance="0.7" easing="ease-out">
    this is some text
  </speech-bubble>

  <button id="copy-html">Copy HTML</button>
  <textarea id="html-output" rows="4" style="width:100%"></textarea>

  <script type="module">
    class SpeechBubble extends HTMLElement {
      static get observedAttributes() {
        return ['animation', 'stagger', 'duration', 'distance', 'easing']
      }

      #animations = {}

      connectedCallback() {
        if (!Object.keys(this.#animations).length) {
          this.animations = {
            'float-down': ({ distance = 0.5 } = {}) => ({
              keyframes: [
                { transform: `translateY(-${distance}em)`, opacity: 0 },
                { transform: 'translateY(0)', opacity: 1 }
              ]
            }),

            'float-up': ({ distance = 0.5 } = {}) => ({
              keyframes: [
                { transform: `translateY(${distance}em)`, opacity: 0 },
                { transform: 'translateY(0)', opacity: 1 }
              ]
            })
          }
        }

        this.spanify()
      }

      attributeChangedCallback(name, oldValue, newValue) {
        if (oldValue === newValue) return
      }

      set animations(definitions) {
        this.#animations = definitions
      }

      get animationName() {
        return this.getAttribute('animation') || 'float-down'
      }

      get stagger() {
        return Number(this.getAttribute('stagger')) || 40
      }

      get duration() {
        return Number(this.getAttribute('duration')) || 250
      }

      get distance() {
        return Number(this.getAttribute('distance')) || 0.5
      }

      get easing() {
        return this.getAttribute('easing') || 'ease-out'
      }

      spanify() {
        const text = this.textContent
        const fragment = document.createDocumentFragment()

        for (const character of Array.from(text)) {
          const span = document.createElement('span')
          span.textContent = character === ' ' ? '\u00A0' : character
          fragment.appendChild(span)
        }

        this.replaceChildren(fragment)
      }

      setText(text) {
        this.textContent = text
        this.spanify()
      }

      play() {
        const factory = this.#animations[this.animationName]

        if (!factory) {
          console.warn(`Animation "${this.animationName}" not found.`)
          return
        }

        const { keyframes } = factory({
          distance: this.distance
        })

        this.querySelectorAll('span').forEach((span, index) => {
          span.getAnimations().forEach(animation => animation.cancel())

          span.animate(keyframes, {
            duration: this.duration,
            delay: index * this.stagger,
            easing: this.easing,
            fill: 'both'
          })
        })
      }
    }

    customElements.define('speech-bubble', SpeechBubble)

    const demo = document.getElementById('demo')

    const controls = {
      text: document.getElementById('text'),
      animation: document.getElementById('animation'),
      stagger: document.getElementById('stagger'),
      duration: document.getElementById('duration'),
      distance: document.getElementById('distance'),
      easing: document.getElementById('easing'),
      replay: document.getElementById('replay'),
      staggerValue: document.getElementById('stagger-value'),
      durationValue: document.getElementById('duration-value'),
      distanceValue: document.getElementById('distance-value')
    }

    function syncOutputs() {
      controls.staggerValue.value = `${controls.stagger.value} ms`
      controls.durationValue.value = `${controls.duration.value} ms`
      controls.distanceValue.value = `${controls.distance.value} em`
    }

    function syncBubble({ replay = true } = {}) {
      demo.setAttribute('animation', controls.animation.value)
      demo.setAttribute('stagger', controls.stagger.value)
      demo.setAttribute('duration', controls.duration.value)
      demo.setAttribute('distance', controls.distance.value)
      demo.setAttribute('easing', controls.easing.value)

      if (demo.textContent !== controls.text.value) {
        demo.setText(controls.text.value)
      }

      syncOutputs()

      if (replay) {
        demo.play()
      }
    }

    controls.text.addEventListener('input', () => syncBubble())
    controls.animation.addEventListener('input', () => syncBubble())
    controls.stagger.addEventListener('input', () => syncBubble())
    controls.duration.addEventListener('input', () => syncBubble())
    controls.distance.addEventListener('input', () => syncBubble())
    controls.easing.addEventListener('input', () => syncBubble())
    controls.replay.addEventListener('click', () => demo.play())

    syncBubble()

    const copyBtn = document.getElementById('copy-html')
    const output = document.getElementById('html-output')

    function generateHTML() {
      const attrs = [
        `animation="${demo.getAttribute('animation')}"`,
        `stagger="${demo.getAttribute('stagger')}"`,
        `duration="${demo.getAttribute('duration')}"`,
        `distance="${demo.getAttribute('distance')}"`,
        `easing="${demo.getAttribute('easing')}"`
      ]

      const text = controls.text.value

      return `<speech-bubble ${attrs.join(' ')}>
  ${text}
</speech-bubble>`
    }

    copyBtn.addEventListener('click', async () => {
      const html = generateHTML()
      output.value = html

      try {
        await navigator.clipboard.writeText(html)
        copyBtn.textContent = 'Copied!'
        setTimeout(() => (copyBtn.textContent = 'Copy HTML'), 1000)
      } catch {
        copyBtn.textContent = 'Copy failed'
      }
    })

    window.SpeechBubble = SpeechBubble
  </script>
</body>

</html>
